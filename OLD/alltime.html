<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aero SMP — History</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #0e0f11; color: #e8e9eb;
    min-height: 100vh; padding: 2.5rem 1.5rem 4rem;
  }
  .container { max-width: 640px; margin: 0 auto; }

  .back {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: #4b5260; text-decoration: none; display: inline-flex;
    align-items: center; gap: 6px; margin-bottom: 2rem;
    transition: color 0.2s; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .back:hover { color: #a0a3a8; }

  .page-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 500;
    color: #a0a3a8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.75rem;
  }

  .stats-grid { display: flex; gap: 12px; margin-bottom: 2rem; flex-wrap: wrap; }
  .stat-card {
    flex: 1; min-width: 140px; background: #161719; border: 1px solid #2a2d33;
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    color: #4b5260; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
  }
  .stat-value { font-size: 20px; font-weight: 600; color: #f0f1f3; }
  .stat-value.green  { color: #5DCAA5; }
  .stat-value.yellow { color: #EF9F27; }
  .stat-value.red    { color: #F09595; }
  .stat-value.none   { color: #4b5260; font-size: 14px; }
  .stat-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #4b5260; margin-top: 4px; }

  /* MONTH ROWS — like claude.ai */
  .month-section { margin-bottom: 1.5rem; }
  .month-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .month-name {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    color: #4b5260; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .month-pct {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500;
  }
  .month-pct.green  { color: #5DCAA5; }
  .month-pct.yellow { color: #EF9F27; }
  .month-pct.red    { color: #F09595; }
  .month-pct.none   { color: #3a3f4a; }

  .bar-row { display: flex; gap: 2px; height: 28px; }
  .bar-row span {
    flex: 1; border-radius: 2px;
    background: #222428; /* gray = no data */
    cursor: default; transition: opacity 0.15s;
  }
  .bar-row span:hover { opacity: 0.6; }
  .bar-row span.up      { background: #1D9E75; }
  .bar-row span.down    { background: #E24B4A; }
  .bar-row span.partial { background: #EF9F27; }

  .section-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: #4b5260; margin-bottom: 0.6rem; padding-left: 2px;
  }

  .incident-card {
    background: #161719; border: 1px solid #2a2d33;
    border-radius: 10px; padding: 1rem 1.25rem;
    border-left: 3px solid #2a2d33; margin-bottom: 0.75rem;
  }
  .incident-card.active   { border-left-color: #E24B4A; }
  .incident-card.resolved { border-left-color: #1D9E75; }
  .inc-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .inc-title { font-size: 14px; font-weight: 500; color: #d4d7db; flex: 1; }
  .inc-type {
    font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 99px;
    font-family: 'IBM Plex Mono', monospace; text-transform: lowercase;
  }
  .inc-type.major   { background: #2c0d0d; color: #F09595; }
  .inc-type.partial { background: #2c1f08; color: #EF9F27; }
  .inc-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4b5260; }
  .inc-dur  { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #4b5260; margin-top: 2px; }
  .inc-body { font-size: 12px; color: #6b7280; margin-top: 8px; line-height: 1.6; }

  .no-incidents {
    background: #161719; border: 1px solid #2a2d33;
    border-radius: 10px; padding: 1.25rem;
    text-align: center; font-size: 12px;
    color: #4b5260; font-family: 'IBM Plex Mono', monospace;
  }

  footer { margin-top: 3rem; text-align: center; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: #2d3138; }
</style>
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← back to status</a>
  <div class="page-title">Aero SMP — Full History</div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">All-time uptime</div>
      <div class="stat-value none" id="alltime-pct">no data</div>
      <div class="stat-sub" id="alltime-since">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total incidents</div>
      <div class="stat-value" id="total-count">—</div>
      <div class="stat-sub" id="total-down">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Longest outage</div>
      <div class="stat-value" id="longest">—</div>
      <div class="stat-sub" id="longest-name">—</div>
    </div>
  </div>

  <div id="month-rows"></div>

  <div class="section-label" style="margin-top:2rem;">All Incidents</div>
  <div id="incident-list"><div class="no-incidents">// loading...</div></div>

  <footer>aero smp · history</footer>
</div>

<script>
const GITHUB_USER = 'TeaTuea';
const GITHUB_REPO = 'AeroSMPUptime';
const JSON_PATH   = 'status.json';

async function fetchStatus() {
  const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${JSON_PATH}?nc=${Date.now()}`;
  return (await fetch(url)).json();
}

function fmtDate(d) {
  const mo = d.toLocaleString('en',{month:'short'});
  const dd = String(d.getDate()).padStart(2,'0');
  const yy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  return `${mo} ${dd} ${yy}, ${hh}:${mm}`;
}
function fmtDur(ms) {
  if (ms < 60000) return '<1m';
  const m = Math.round(ms/60000), h = Math.floor(m/60), r = m%60, d = Math.floor(h/24), rh = h%24;
  if (d > 0) return `${d}d ${rh}h ${r}m`;
  if (h > 0) return `${h}h ${r}m`;
  return `${m}m`;
}
function pctClass(p) {
  if (p === null) return 'none';
  return p >= 99 ? 'green' : p >= 90 ? 'yellow' : 'red';
}

fetchStatus().then(data => {
  const incidents = data.incidents || [];
  const now = Date.now();

  if (!incidents.length) {
    document.getElementById('alltime-pct').textContent = 'no data';
    document.getElementById('alltime-since').textContent = 'no incidents logged yet';
    document.getElementById('total-count').textContent = '0';
    document.getElementById('total-down').textContent = '0m total downtime';
    document.getElementById('longest').textContent = '—';
    document.getElementById('longest-name').textContent = 'no outages';
    document.getElementById('incident-list').innerHTML = '<div class="no-incidents">// no incidents logged</div>';
    document.getElementById('month-rows').innerHTML = '<div class="no-incidents" style="margin-bottom:1.5rem;">// no data yet — log an incident to start tracking</div>';
    return;
  }

  const sorted = incidents.slice().sort((a,b) => new Date(a.start)-new Date(b.start));
  const firstDate = new Date(data.server_start || sorted[0].start);
  const totalWindowMs = now - firstDate.getTime();

  // all-time downtime
  let totalDownMs = 0, longestMs = 0, longestInc = null;
  incidents.forEach(inc => {
    const s = new Date(inc.start);
    const e = inc.status === 'resolved' ? new Date(inc.end) : new Date();
    const dur = e - s;
    totalDownMs += dur;
    if (dur > longestMs) { longestMs = dur; longestInc = inc; }
  });

  const allPct = (((totalWindowMs - totalDownMs) / totalWindowMs) * 100).toFixed(3);
  const pEl = document.getElementById('alltime-pct');
  pEl.textContent = allPct + '%';
  pEl.className   = 'stat-value ' + pctClass(parseFloat(allPct));
  document.getElementById('alltime-since').textContent = 'since ' + fmtDate(firstDate);
  document.getElementById('total-count').textContent   = incidents.length;
  document.getElementById('total-down').textContent    = fmtDur(totalDownMs) + ' total downtime';
  document.getElementById('longest').textContent       = fmtDur(longestMs);
  document.getElementById('longest-name').textContent  = longestInc ? longestInc.title : '—';

  // build month rows going back from today to first incident month
  const msDay = 86400000;
  const monthRows = document.getElementById('month-rows');
  monthRows.innerHTML = '';

  // collect all months from first incident to now
  const months = [];
  let cur = new Date(firstDate.getFullYear(), firstDate.getMonth(), 1);
  const nowDate = new Date();
  while (cur <= nowDate) {
    months.push(new Date(cur));
    cur.setMonth(cur.getMonth() + 1);
  }
  months.reverse(); // newest first

  months.forEach(monthStart => {
    const year  = monthStart.getFullYear();
    const month = monthStart.getMonth();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const monthLabel = monthStart.toLocaleString('en', {month:'long', year:'numeric'});

    // build day slots for this month
    let monthDownMs = 0, monthTotalMs = 0, hasAnyData = false;
    const daySlots = [];

    for (let d = 1; d <= daysInMonth; d++) {
      const dayDate = new Date(year, month, d);
      // skip future days
      const isFuture = dayDate > nowDate;
      // skip days before first incident
      const serverStart = new Date(data.server_start || sorted[0].start);
      const isBeforeFirst = dayDate < new Date(serverStart.getFullYear(), serverStart.getMonth(), serverStart.getDate());

      const slot = { date: dayDate.toISOString().split('T')[0], hasData: false, downMs: 0, partialMs: 0, isFuture };

      if (!isFuture && !isBeforeFirst) {
        slot.hasData = true;
        hasAnyData = true;
        monthTotalMs += msDay;
      }

      incidents.forEach(inc => {
        const s = new Date(inc.start);
        const e = inc.status === 'resolved' ? new Date(inc.end) : new Date();
        const s0 = new Date(year, month, d, 0,0,0).getTime();
        const s1 = new Date(year, month, d, 23,59,59).getTime();
        const ov0 = Math.max(s.getTime(), s0);
        const ov1 = Math.min(e.getTime(), s1);
        if (ov1 > ov0) {
          slot.hasData = true;
          if (inc.type === 'partial') slot.partialMs += ov1 - ov0;
          else { slot.downMs += ov1 - ov0; monthDownMs += ov1 - ov0; }
        }
      });

      daySlots.push(slot);
    }

    // month uptime %
    let monthPct = null;
    if (monthTotalMs > 0) {
      monthPct = parseFloat((((monthTotalMs - monthDownMs) / monthTotalMs) * 100).toFixed(2));
    }

    const section = document.createElement('div');
    section.className = 'month-section';

    const header = document.createElement('div');
    header.className = 'month-header';
    header.innerHTML = `
      <div class="month-name">${monthLabel}</div>
      <div class="month-pct ${pctClass(monthPct)}">${monthPct !== null ? monthPct+'% uptime' : 'no data'}</div>
    `;

    const barRow = document.createElement('div');
    barRow.className = 'bar-row';
    daySlots.forEach(slot => {
      const s = document.createElement('span');
      if (slot.isFuture || !slot.hasData) s.className = '';
      else if (slot.downMs)    s.className = 'down';
      else if (slot.partialMs) s.className = 'partial';
      else                     s.className = 'up';
      s.title = slot.date + (slot.isFuture ? ' — future' : !slot.hasData ? ' — no data' : slot.downMs ? ' — outage' : slot.partialMs ? ' — degraded' : ' — operational');
      barRow.appendChild(s);
    });

    section.appendChild(header);
    section.appendChild(barRow);
    monthRows.appendChild(section);
  });

  // all incidents list
  const list = document.getElementById('incident-list');
  list.innerHTML = incidents.slice().reverse().map(inc => {
    const start = new Date(inc.start);
    const end   = inc.status === 'resolved' ? new Date(inc.end) : null;
    const dur   = end ? fmtDur(end-start) : 'ongoing';
    return `<div class="incident-card ${inc.status}">
      <div class="inc-top">
        <div class="inc-title">${inc.title}</div>
        <div class="inc-type ${inc.type}">${inc.type}</div>
      </div>
      <div class="inc-meta">${fmtDate(start)}${end ? ' → '+fmtDate(end) : ' → ongoing'}</div>
      <div class="inc-dur">${dur}</div>
      ${inc.body ? `<div class="inc-body">${inc.body}</div>` : ''}
    </div>`;
  }).join('');

}).catch(() => {
  document.getElementById('incident-list').innerHTML = '<div class="no-incidents">// failed to load</div>';
});
</script>
</body>
</html>
